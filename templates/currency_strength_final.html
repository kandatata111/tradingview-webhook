<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通貨強弱メーター</title>
  <!-- Socket.IO CDN -->
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <style>
    :root { --cs-font-size: 14px; }
    body {
      font-family: 'Segoe UI', Meiryo, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 6px;
      margin: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0;
    }

    h1 {
      text-align: center;
      color: #06b7f9;
      margin-bottom: 20px;
      font-size: 24px;
    }

    /* 通貨強弱表 */
    .strength-table {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 6px;
      border: 1px solid #444;
      margin-bottom: 0;
    }

    .strength-title {
      color: #06b7f9;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #06b7f9;
    }

    /* テーブルレイアウト */
    .strength-table-wrapper {
      width: 100%;
      overflow-x: auto;
    }

    .strength-table-grid {
      display: grid;
      grid-template-columns: 50px repeat(5, 1fr) 2fr;
      gap: 2px;
      font-family: 'Consolas', monospace;
      font-size: var(--cs-font-size,14px);
      font-weight: bold;
      width: 100%;
    }

    .table-header {
      font-weight: bold;
      background: #2d68f8;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4px;
      border: 1px solid #555;
      border-radius: 3px;
    }

    .table-header-currencies {
      font-weight: bold;
      background: #2d68f8;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4px;
      border: 1px solid #555;
      border-radius: 3px;
      grid-column: span 5;
    }

    .table-header-recommended {
      font-weight: bold;
      background: #2d68f8;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4px;
      border: 1px solid #555;
      border-radius: 3px;
    }

    .table-row-label {
      font-weight: bold;
      background: #2d68f8;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: 1px solid #555;
      padding: 4px;
      border-radius: 3px;
    }

    .table-cell {
      border: 1px solid #fff;
      padding: 4px 5px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      text-align: left;
      border-radius: 3px;
      white-space: nowrap;
    }

    .table-cell.very-weak { background: #d32f2f; color: #fff; }
    .table-cell.weak { background: #f57c00; color: #fff; }
    .table-cell.neutral { background: #616161; color: #fff; }
    .table-cell.strong { background: #388e3c; color: #fff; }
    .table-cell.very-strong { background: #1976d2; color: #fff; }

    .table-recommended {
      border: 1px solid #555;
      padding: 4px 6px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      flex-wrap: nowrap;
    }

    .recommended-pair {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: var(--cs-font-size,14px);
      white-space: nowrap;
    }

    .buy-badge {
      background: #1976d2;
      color: #fff;
      padding: 2px 5px;
      border-radius: 3px;
      font-weight: bold;
      font-size: var(--cs-font-size,14px);
    }

    .sell-badge {
      background: #ff57ea;
      color: #fff;
      padding: 2px 5px;
      border-radius: 3px;
      font-weight: bold;
      font-size: var(--cs-font-size,14px);
    }

    /* 推奨ペア */
    .recommended {
      display: none;
    }

    /* 通貨色分け */
    .very-weak { background: #d32f2f; color: #fff; }
    .weak { background: #f57c00; color: #fff; }
    .neutral { background: #616161; color: #fff; }
    .strong { background: #388e3c; color: #fff; }
    .very-strong { background: #1976d2; color: #fff; }

    /* タブスタイル */
    .tab-container {
      background: #1a1a1a;
      border-radius: 8px;
      margin-top: 20px;
    }
    
    .tab-headers {
      display: flex;
      gap: 4px;
      background: #2a2a2a;
      padding: 8px;
      border-radius: 8px 8px 0 0;
      border-bottom: 2px solid #444;
    }
    
    .tab-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      cursor: pointer;
      background: #333;
      border-radius: 6px 6px 0 0;
      font-size: 15px;
      font-weight: 500;
      color: #999;
      transition: all 0.2s;
      border: none;
      border-bottom: 3px solid transparent;
    }
    
    .tab-header:hover {
      background: #3a3a3a;
      color: #ccc;
    }
    
    .tab-header.active {
      background: #2d68f8;
      color: #fff;
      border-bottom-color: #2d68f8;
    }
    
    .tab-icon {
      font-size: 18px;
    }
    
    .tab-content {
      display: none;
      padding: 0;
      background: #1e1e1e;
      border-radius: 0 0 8px 8px;
    }
    
    .tab-content.active {
      display: block;
      padding: 20px;
    }

    /* アコーディオン（旧スタイル - 未使用） */
    .accordion {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }

    .accordion-item {
      background: #2a2a2a;
      border-radius: 8px;
      border: 1px solid #444;
      overflow: hidden;
    }

    .accordion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      background: linear-gradient(90deg, #2a2a2a, #252525);
      transition: background 0.3s;
      user-select: none;
    }

    .accordion-header:hover {
      background: linear-gradient(90deg, #333, #2a2a2a);
    }

    .accordion-header.active {
      background: linear-gradient(90deg, #2d68f8, #1e4fcc);
    }

    .accordion-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 15px;
      font-weight: bold;
      color: #e0e0e0;
    }

    .accordion-header.active .accordion-title {
      color: #fff;
    }

    .accordion-icon {
      font-size: 20px;
    }

    .accordion-arrow {
      font-size: 18px;
      transition: transform 0.3s;
    }

    .accordion-header.active .accordion-arrow {
      transform: rotate(180deg);
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease-out, padding 0.4s ease-out;
      padding: 0 20px;
    }

    .accordion-content.active {
      max-height: 1000px;
      padding: 20px;
      border-top: 2px solid #444;
    }

    /* フォーム要素 */
    .form-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .form-row label {
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .checkbox-item input[type="checkbox"] {
      cursor: pointer;
      width: 18px;
      height: 18px;
    }

    .checkbox-item label {
      cursor: pointer;
    }

    select, input[type="text"] {
      padding: 8px 12px;
      background: #333;
      color: #fff;
      border: 1px solid #666;
      border-radius: 4px;
      font-size: 13px;
    }

    button {
      padding: 8px 16px;
      background: #2d68f8;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: background 0.3s;
      white-space: nowrap;
    }

    button:hover {
      background: #4080ff;
    }

    /* 音声設定の1行レイアウト */
    .voice-timeframe {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .voice-timeframe input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .voice-timeframe label {
      min-width: 80px;
      font-weight: bold;
    }

    .voice-timeframe input[type="text"] {
      flex: 1;
    }

    /* チェックボックスグリッド */
    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 8px;
    }

    .subsection-title {
      color: #06b7f9;
      font-size: 13px;
      font-weight: bold;
      margin: 16px 0 8px;
    }
  </style>
<script>
// apply stored cs font size and update on storage events
function applyCsFontSize(){
  const sz = localStorage.getItem('tv_cs_font_size');
  const val = sz ? sz+'px' : '14px';
  document.documentElement.style.setProperty('--cs-font-size', val);
}
applyCsFontSize();
window.addEventListener('storage', (e)=>{
  if(e.key==='tv_cs_font_size') applyCsFontSize();
});
// セレクト変更時に即時反映（保存ボタンを押さなくても反映）
document.addEventListener('DOMContentLoaded', function(){
  const sel = document.getElementById('csFontSizeSelect');
  if(sel){
    sel.addEventListener('change', function(){
      document.documentElement.style.setProperty('--cs-font-size', sel.value+'px');
    });
  }
});
</script>
</head>
<body>
  <div class="container">
    <!-- 通貨強弱 -->
    <div class="strength-table" id="strengthTableContainer" style="transform-origin: top left; transition: transform 0.2s ease;">
      <div class="strength-title">
        通貨強弱
        <span id="loadingText" style="color:#ffd700;font-size:14px;margin-left:10px;">読み込み中...</span>
        <span id="updateTime" style="color:#fff;font-size:12px;margin-left:10px;"></span>

      </div>
      
      <div id="strengthData">
        <!-- JavaScriptで動的に生成 -->
      </div>
    </div>

    <!-- 設定項目 -->
    <div class="tab-container" id="settingsContainer" style="transform-origin: top left; transition: transform 0.2s ease;">
      <!-- タブヘッダー -->
      <div class="tab-headers">
        <button class="tab-header" data-tab="history">
          <span class="tab-icon">📜</span>
          <span>最強・最弱変更履歴</span>
        </button>
        <button class="tab-header" data-tab="display">
          <span class="tab-icon">📊</span>
          <span>表示設定</span>
        </button>
        <button class="tab-header" data-tab="voice">
          <span class="tab-icon">🔊</span>
          <span>音声通知設定</span>
        </button>
        <button class="tab-header" data-tab="save">
          <span class="tab-icon">💾</span>
          <span>設定保存</span>
        </button>
      </div>

      <!-- タブコンテンツ -->
      <!-- 最強・最弱変更履歴 -->
      <div class="tab-content" data-tab-content="history">
        <div id="changeHistory" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
          <!-- JavaScriptで動的に生成 -->
        </div>
      </div>

      <!-- 表示設定 -->
      <div class="tab-content" data-tab-content="display">
        <div class="form-section">
            <div style="display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: start;">
              <div>
                <div class="subsection-title">表示項目</div>
                <div style="display: flex; gap: 20px; margin-bottom: 16px;">
                  <label class="checkbox-item">
                    <input type="checkbox" id="showCurrencies" checked>
                    通貨強弱を表示
                  </label>
                  <label class="checkbox-item">
                    <input type="checkbox" id="showRecommended" checked>
                    推奨ペアを表示
                  </label>
                  <label class="checkbox-item">
                    <input type="checkbox" id="showRawScore" checked>
                    スコア[+000]を表示
                  </label>
                  <label class="checkbox-item">
                    <input type="checkbox" id="showPercentage" checked>
                    %を表示
                  </label>
                  <label class="checkbox-item">
                    <input type="checkbox" id="showGauge">
                    ゲージを表示
                  </label>
                </div>
              </div>
              <div style="display:flex;flex-direction:column;gap:16px;">
                <div>
                  <div class="subsection-title">ズーム倍率</div>
                  <select id="zoomLevel">
                    <option value="50">50%</option>
                    <option value="60">60%</option>
                    <option value="70">70%</option>
                    <option value="80">80%</option>
                    <option value="90">90%</option>
                    <option value="100" selected>100%</option>
                    <option value="110">110%</option>
                    <option value="120">120%</option>
                    <option value="130">130%</option>
                    <option value="140">140%</option>
                    <option value="150">150%</option>
                  </select>
                </div>
                <div>
                  <div class="subsection-title">文字サイズ</div>
                  <select id="csFontSizeSelect">
                    <option value="10">10px</option>
                    <option value="11">11px</option>
                    <option value="12">12px</option>
                    <option value="13">13px</option>
                    <option value="14" selected>14px（標準）</option>
                    <option value="15">15px</option>
                    <option value="16">16px</option>
                    <option value="17">17px</option>
                    <option value="18">18px</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="subsection-title">通貨名表示言語</div>
            <div style="display: flex; gap: 20px; margin-bottom: 16px;">
              <label class="checkbox-item">
                <input type="radio" name="currencyLang" id="langEn" value="en" checked>
                英語（USD / JPY）
              </label>
              <label class="checkbox-item">
                <input type="radio" name="currencyLang" id="langJa" value="ja">
                日本語（米ドル / 日本円）
              </label>
            </div>

            <div class="subsection-title">時間足</div>
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
              <label class="checkbox-item">
                <input type="checkbox" id="show5m" checked>
                5分足
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="show15m" checked>
                15分足
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="show1H" checked>
                1時間足
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="show4H" checked>
                4時間足
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="showD" checked>
                日足
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="showAv" checked>
                平均
              </label>
            </div>

            <!-- 表示通貨 -->
            <div style="margin-top:16px;border-top:1px dashed #333;padding-top:12px;">
              <div class="subsection-title">表示通貨（非表示にすると通貨強弱・推奨ペアから除外）</div>
              <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <label class="checkbox-item"><input type="checkbox" class="currency-toggle" data-currency="USD" checked> USD（米ドル）</label>
                <label class="checkbox-item"><input type="checkbox" class="currency-toggle" data-currency="JPY" checked> JPY（日本円）</label>
                <label class="checkbox-item"><input type="checkbox" class="currency-toggle" data-currency="EUR" checked> EUR（ユーロ）</label>
                <label class="checkbox-item"><input type="checkbox" class="currency-toggle" data-currency="GBP" checked> GBP（ポンド）</label>
                <label class="checkbox-item"><input type="checkbox" class="currency-toggle" data-currency="AUD" checked> AUD（豪ドル）</label>
              </div>
            </div>

            <!-- 表示通貨ペア -->
            <div style="margin-top:16px;border-top:1px dashed #333;padding-top:12px;">
              <div class="subsection-title">表示通貨ペア（推奨ペアの計算対象）</div>
              <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px;">
                <label class="checkbox-item"><input type="checkbox" class="pair-toggle" data-pair="USDJPY" checked> USDJPY</label>
                <label class="checkbox-item"><input type="checkbox" class="pair-toggle" data-pair="EURUSD" checked> EURUSD</label>
                <label class="checkbox-item"><input type="checkbox" class="pair-toggle" data-pair="GBPUSD" checked> GBPUSD</label>
                <label class="checkbox-item"><input type="checkbox" class="pair-toggle" data-pair="AUDUSD" checked> AUDUSD</label>
                <label class="checkbox-item"><input type="checkbox" class="pair-toggle" data-pair="EURJPY" checked> EURJPY</label>
                <label class="checkbox-item"><input type="checkbox" class="pair-toggle" data-pair="GBPJPY" checked> GBPJPY</label>
                <label class="checkbox-item"><input type="checkbox" class="pair-toggle" data-pair="AUDJPY" checked> AUDJPY</label>
                <label class="checkbox-item"><input type="checkbox" class="pair-toggle" data-pair="EURGBP" checked> EURGBP</label>
                <label class="checkbox-item"><input type="checkbox" class="pair-toggle" data-pair="EURAUD" checked> EURAUD</label>
                <label class="checkbox-item"><input type="checkbox" class="pair-toggle" data-pair="GBPAUD" checked> GBPAUD</label>
              </div>
            </div>

            <!-- 正規化 / クリップ設定 -->
            <div style="margin-top:16px;border-top:1px dashed #333;padding-top:12px;">
              <div class="subsection-title">正規化 / クリップ設定</div>
              <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
                <div style="display:flex;flex-direction:column;gap:6px;min-width:220px;">
                  <label>通貨強弱正規化 (理論Max: 400)</label>
                  <div style="display:flex;gap:8px;align-items:center;">
                    <input id="currencyNormBase" type="number" min="1" max="400" value="350" style="width:100px;padding:6px;background:#111;color:#ddd;border:1px solid #333;border-radius:4px;">
                    <small style="color:#94a3b8;">(表示基準 — 通貨の生スコアをこの値で割って%算出)</small>
                  </div>
                </div>

                <div style="display:flex;flex-direction:column;gap:6px;min-width:220px;">
                  <label>推奨ペア正規化 (理論Max: 800)</label>
                  <div style="display:flex;gap:8px;align-items:center;">
                    <input id="pairNormBase" type="number" min="1" max="800" value="700" style="width:100px;padding:6px;background:#111;color:#ddd;border:1px solid #333;border-radius:4px;">
                    <small style="color:#94a3b8;">(pair_score をこの値で割って%算出)</small>
                  </div>
                </div>

                <div style="display:flex;align-items:center;gap:8px;min-width:320px;">
                  <input type="checkbox" id="clipEnabled" checked>
                  <label style="font-size:0.95em;">生スコアが&nbsp;<input id="clipThreshold" type="number" min="1" max="400" value="350" style="width:80px;padding:6px;background:#111;color:#ddd;border:1px solid #333;border-radius:4px;display:inline-block;margin-left:6px;"> を超える場合は <strong>100%</strong> でクリップ（表示上）</label>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 音声通知設定 -->
      <div class="tab-content" data-tab-content="voice">
        <div class="form-section">
            <div class="form-row">
              <label style="min-width: 100px;">声優選択：</label>
              <select id="voiceActress">
                <option value="nanami">七海（女性）</option>
                <option value="keita">圭太（男性）</option>
              </select>
            </div>
            <div class="form-row">
              <input type="checkbox" id="enableElectronic">
              <label>電子音を有効化</label>
              <select id="electronicSound" style="margin-left: 12px;" disabled>
                <option value="">なし</option>
              </select>
            </div>

            <div class="subsection-title">時間足別通知設定</div>
            
            <div class="voice-timeframe">
              <input type="checkbox" id="notify15m" checked>
              <label for="notify15m">15分足</label>
              <input type="text" id="msg15m" placeholder="通知メッセージ">
              <button id="play15m">▶ 再生</button>
            </div>

            <div class="voice-timeframe">
              <input type="checkbox" id="notify1H" checked>
              <label for="notify1H">1時間足</label>
              <input type="text" id="msg1H" placeholder="通知メッセージ">
              <button id="play1H">▶ 再生</button>
            </div>

            <div class="voice-timeframe">
              <input type="checkbox" id="notify4H" checked>
              <label for="notify4H">4時間足</label>
              <input type="text" id="msg4H" placeholder="通知メッセージ">
              <button id="play4H">▶ 再生</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 設定保存 -->
      <div class="tab-content" data-tab-content="save">
        <button id="saveSettings" style="width:100%;padding:12px;font-size:15px;">💾 設定を保存</button>
        <div id="saveMessage" style="margin-top:12px;text-align:center;color:#28a745;display:none;font-weight:bold;">✓ 設定を保存しました</div>
      </div>
    </div>
  </div>

  <script>
    // タブ切り替え機能
    function switchTab(tabName) {
      console.log('[TAB] switchTab called with:', tabName);
      
      // 全てのタブヘッダーとコンテンツから active を削除
      document.querySelectorAll('.tab-header').forEach(header => {
        header.classList.remove('active');
      });
      document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.remove('active');
      });
      
      // クリックされたタブをアクティブに
      if (tabName) {
        const header = document.querySelector(`.tab-header[data-tab="${tabName}"]`);
        const content = document.querySelector(`.tab-content[data-tab-content="${tabName}"]`);
        
        if (header && content) {
          console.log('[TAB] Activating tab:', tabName);
          header.classList.add('active');
          content.classList.add('active');
        } else {
          console.log('[TAB] Tab not found:', tabName);
        }
      } else {

    // 変更履歴を表示（サーバーから取得）
    async function renderChangeHistory() {
      const container = document.getElementById('changeHistory');
      if (!container) return;
      
      try {
        // サーバーから変更履歴を取得
        const response = await fetch('/api/change_history?limit=5');
        const result = await response.json();
        
        if (result.status !== 'success') {
          console.error('[HISTORY] Failed to fetch history:', result.msg);
          container.innerHTML = '<div style="color: #f44; padding: 12px;">履歴の取得に失敗しました</div>';
          return;
        }
        
        const history = result.data;
        
        // 時間足リスト
        const timeframes = [
          { key: '15m', label: '15分足' },
          { key: '1H', label: '1時間足' },
          { key: '4H', label: '4時間足' },
          { key: 'D', label: '日足' },
          { key: 'Av', label: '平均' }
        ];
        
        let html = '';
        
        timeframes.forEach(tf => {
          const records = history[tf.key] || [];
          
          html += `
            <div style="background: #222; padding: 12px; border-radius: 6px; border-left: 3px solid #2d68f8;">
              <div style="color: #06b7f9; font-weight: bold; margin-bottom: 8px;">${tf.label}　弱⇔強</div>
              <div style="font-size: 12px; font-family: 'Consolas', monospace;">
          `;
          
          if (records.length === 0) {
            html += `<div style="color: #666;">変更履歴なし</div>`;
          } else {
            records.forEach(record => {
              const weakestPercent = record.weakest_percent !== undefined ? record.weakest_percent : 0;
              const strongestPercent = record.strongest_percent !== undefined ? record.strongest_percent : 0;
              const weakestSign = weakestPercent >= 0 ? '+' : '';
              const strongestSign = strongestPercent >= 0 ? '+' : '';
              html += `<div style="margin-bottom: 4px;">${record.timestamp}　${record.weakest}${weakestSign}${weakestPercent}%⇔${record.strongest}${strongestSign}${strongestPercent}%</div>`;
            });
          }
          
          html += `
              </div>
            </div>
          `;
        });
        
        container.innerHTML = html;
        
        console.log('[HISTORY] Rendered change history from server');
      } catch (e) {
        console.error('[HISTORY] Failed to render history:', e);
        container.innerHTML = '<div style="color: #f44; padding: 12px;">履歴の表示に失敗しました</div>';
      }
    }

        // 音声を再生

          const pair = e.target.dataset.pair;
          if (pair) {
            displaySettings.activePairs[pair] = e.target.checked;
            if (window.currentData) renderStrengthData(window.currentData);
          }
        });
      });
    });
    // 通貨ペアの定義（実在するペアのみ）
    const PAIR_DEFINITIONS = {
      'USDJPY': ['USD', 'JPY'],
      'EURUSD': ['EUR', 'USD'],
      'GBPUSD': ['GBP', 'USD'],
      'AUDUSD': ['AUD', 'USD'],
      'EURJPY': ['EUR', 'JPY'],
      'GBPJPY': ['GBP', 'JPY'],
      'AUDJPY': ['AUD', 'JPY'],
      'EURGBP': ['EUR', 'GBP'],
      'EURAUD': ['EUR', 'AUD'],
      'GBPAUD': ['GBP', 'AUD']
    };

    // 通貨強弱の色分け
    function getStrengthClass(score) {
      if (score <= -40) return 'very-weak';
      if (score <= -20) return 'weak';
      if (score <= 19) return 'neutral';
      if (score <= 39) return 'strong';
      return 'very-strong';
    }

    // 推奨ペアを計算
    function calculateRecommendedPairs(currencies, rawScores) {
      const pairs = [];
      
      for (const [pair, [base, quote]] of Object.entries(PAIR_DEFINITIONS)) {
        // 非表示ペアをスキップ
        if (displaySettings.activePairs && displaySettings.activePairs[pair] === false) continue;
        // 非表示通貨を含むペアをスキップ
        if (displaySettings.activeCurrencies && (
          displaySettings.activeCurrencies[base] === false ||
          displaySettings.activeCurrencies[quote] === false
        )) continue;
        const baseScore = rawScores[base] || 0;
        const quoteScore = rawScores[quote] || 0;
        const diff = Math.abs(baseScore - quoteScore);
        
        // 差が小さい（レンジ）はスキップ
        if (diff < 20) continue;
        
        let direction, displayPair;
        if (baseScore > quoteScore) {
          // ベース通貨が強い = 買い
          direction = 'buy';
          displayPair = pair;
        } else {
          // クォート通貨が強い = 売り
          direction = 'sell';
          displayPair = pair;
        }
        
        pairs.push({ pair: displayPair, base, quote, direction, score: Math.round(diff) });
      }
      
      // スコア順にソート
      pairs.sort((a, b) => b.score - a.score);
      
      return pairs.slice(0, 3);  // 上位3つ
    }

    // データを表示
    function renderStrengthData(data) {
      try {
        console.log('[renderStrengthData] Starting render with data:', data);
        
        const container = document.getElementById('strengthData');
        if (!container) {
          console.error('[renderStrengthData] Container #strengthData not found!');
          return;
        }
        
        container.innerHTML = '';
        
        // ゲージモードならテーブルを縦横入れ替えて描画
        if (displaySettings.showGauge) {
          renderGaugeLayout(data, container);
          return;
        }
        
        // テーブル作成
        const table = document.createElement('div');
        table.className = 'strength-table-wrapper';
        
        const grid = document.createElement('div');
        grid.className = 'strength-table-grid';
        
        // ヘッダー行
        const headerTime = document.createElement('div');
        headerTime.className = 'table-header';
        headerTime.textContent = '時間';
        grid.appendChild(headerTime);
        
        if (displaySettings.showCurrencies) {
          const headerCurrencies = document.createElement('div');
          headerCurrencies.className = 'table-header-currencies';
          headerCurrencies.style.textAlign = 'center';
          headerCurrencies.style.letterSpacing = '0.05em';
          headerCurrencies.style.gridColumn = `span ${displaySettings.activeCurrencies ? Object.values(displaySettings.activeCurrencies).filter(v => v !== false).length : 5}`; // 通貨列数に合わせる
          headerCurrencies.textContent = '弱　　◀　　◀　　中　　▶　　▶　　強';
          grid.appendChild(headerCurrencies);
        }
        
        if (displaySettings.showRecommended) {
          const headerRecommended = document.createElement('div');
          headerRecommended.className = 'table-header-recommended';
          headerRecommended.textContent = '推奨ペア';
          grid.appendChild(headerRecommended);
        }
        
        console.log('[renderStrengthData] Headers created');
        
        // データ行
      const timeframes = [
        { key: '5m', id: 'show5m' },
        { key: '15m', id: 'show15m' },
        { key: '1H', id: 'show1H' },
        { key: '4H', id: 'show4H' },
        { key: 'D', id: 'showD' },
        { key: 'Av', id: 'showAv' }
      ];
      
      timeframes.forEach(tf => {
        if (!displaySettings[tf.id] || !data[tf.key]) return;
        
        const tfData = data[tf.key];
        const currencies = tfData.currencies; // すでにソート済み（弱→強）
        // 通貨データが空の場合はスキップ（空cloudsペイロードでDBが上書きされた場合の保護）
        if (!currencies || currencies.length === 0) {
          console.log('[renderStrengthData] ' + tf.key + ': currencies empty, skipping row');
          return;
        }
        const rawScores = tfData.raw_scores;
        // 非表示通貨を除外したリスト
        const filteredCurrencies = displaySettings.activeCurrencies
          ? currencies.filter(item => displaySettings.activeCurrencies[item.currency] !== false)
          : currencies;
        const recommendedPairs = calculateRecommendedPairs(currencies, rawScores);
        
        // 🔔 変更検出：最弱と最強をチェック
        if (filteredCurrencies && filteredCurrencies.length > 0 && voiceNotificationSettings.notify[tf.key]) {
          const currentWeakest = filteredCurrencies[0].currency;  // 最弱
          const currentStrongest = filteredCurrencies[filteredCurrencies.length - 1].currency;  // 最強
          const prevState = previousExtreme[tf.key] || {};
          
          console.log(`[${tf.key}] 通知チェック: 最弱=${currentWeakest}, 最強=${currentStrongest}`);
          
          // 前回の状態がない場合は初期化
          if (!prevState.weakest) {
            console.log(`[${tf.key}] 初回初期化: weakest=${currentWeakest}, strongest=${currentStrongest}`);
            previousExtreme[tf.key] = {
              weakest: currentWeakest,
              strongest: currentStrongest
            };
          } else {
            // 最弱が変更されたか、最強が変更されたか確認
            const weakestChanged = prevState.weakest !== currentWeakest;
            const strongestChanged = prevState.strongest !== currentStrongest;
            
            console.log(`[${tf.key}] 変更検出: weakest ${prevState.weakest}→${currentWeakest} (${weakestChanged}), strongest ${prevState.strongest}→${currentStrongest} (${strongestChanged})`);
            
            if (weakestChanged || strongestChanged) {
              // メッセージを生成して通知を発火
              let message = voiceNotificationSettings.customMessages[tf.key] || `${tf.key}の通貨強弱が変更されました。`;
              
              // ユーザーがメッセージにプレースホルダを含めていないか確認
              if (message.includes('[WEAKEST]') || message.includes('[STRONGEST]')) {
                message = message
                  .replace('[WEAKEST]', currentWeakest)
                  .replace('[STRONGEST]', currentStrongest);
              }
              
              console.log(`[${tf.key}] 🔔 通知発火: "${message}"`);
              playNotificationSound(tf.key, message);
              
              // 状態を更新
              previousExtreme[tf.key] = {
                weakest: currentWeakest,
                strongest: currentStrongest
              };
            }
          }
        }
        
        // 時間足ラベル
        const labelCell = document.createElement('div');
        labelCell.className = 'table-row-label';
        labelCell.textContent = tf.key;
        grid.appendChild(labelCell);
        
        // 通貨セル（5通貨、ソート済み）
        if (displaySettings.showCurrencies) {
          // フィルタリング後の通貨数分セルを作成
          const currencyCount = filteredCurrencies.length;
          for (let i = 0; i < currencyCount; i++) {
            const cell = document.createElement('div');
            
            if (i < filteredCurrencies.length) {
              // データがある場合
              const item = filteredCurrencies[i];
              cell.className = 'table-cell ' + getStrengthClass(item.score);
              
              // raw score を使ってクライアント側で % を計算（displaySettings に従う）
              const rawScore = item.score || 0;
              let percentage = 0;
              const denom = (displaySettings.currencyNormalizationBase && displaySettings.currencyNormalizationBase > 0) ? displaySettings.currencyNormalizationBase : 350;
              percentage = Math.round((rawScore / denom) * 100);

              // クリップ（表示上）: 生スコアが閾値を超えたら ±100% にする
              if (displaySettings.clipEnabled && Math.abs(rawScore) > (displaySettings.clipThreshold || 350)) {
                percentage = rawScore >= 0 ? 100 : -100;
              }

              const percentText = percentage >= 0 ? `+${String(percentage).padStart(2, '0')}` : `-${String(Math.abs(percentage)).padStart(2, '0')}`;
              const scoreText = rawScore >= 0 ? `+${String(rawScore).padStart(3, '0')}` : `-${String(Math.abs(rawScore)).padStart(3, '0')}`;

              const scoreLabel = displaySettings.showRawScore ? ` [${scoreText}]` : '';
              const pctPart = displaySettings.showPercentage ? ` ${percentText}%` : '';
              cell.textContent = `${getCurrencyLabel(item.currency)}${pctPart}${scoreLabel}`;
              cell.title = `${item.currency} (${getCurrencyLabel(item.currency)}) score:${rawScore}`;
            } else {
              // データがない場合（空セル）
              cell.className = 'table-cell';
              cell.textContent = '-';
              cell.style.opacity = '0.3';
            }
            
            grid.appendChild(cell);
          }
        }
        
        // 推奨ペアセル（1行表示）
        if (displaySettings.showRecommended) {
          const pairCell = document.createElement('div');
          pairCell.className = 'table-recommended';
        
        recommendedPairs.forEach(pairInfo => {
          const pairSpan = document.createElement('span');
          pairSpan.className = 'recommended-pair';
          
          const pairName = document.createElement('span');
          pairName.style.fontWeight = 'bold';
          pairName.style.color = '#fff';
          pairName.textContent = getPairLabel(pairInfo.base, pairInfo.quote);
          pairSpan.appendChild(pairName);
          
          const dirBadge = document.createElement('span');
          dirBadge.className = pairInfo.direction === 'buy' ? 'buy-badge' : 'sell-badge';
          dirBadge.textContent = pairInfo.direction === 'buy' ? '買↑' : '売↓';
          pairSpan.appendChild(dirBadge);
          
          // pair % は displaySettings.pairNormalizationBase を使用
          const pairDenom = (displaySettings.pairNormalizationBase && displaySettings.pairNormalizationBase > 0) ? displaySettings.pairNormalizationBase : 700;
          let percentage = Math.round((pairInfo.score / pairDenom) * 100);
          percentage = Math.max(-100, Math.min(100, percentage)); // 表示上はクリップ
          const percentText = percentage >= 0 ? `+${String(percentage).padStart(2, '0')}` : `-${String(Math.abs(percentage)).padStart(2, '0')}`;
          
          const scoreSpan = document.createElement('span');
          scoreSpan.style.color = '#ffd700';
          scoreSpan.style.fontWeight = 'bold';
          scoreSpan.textContent = !displaySettings.showPercentage
            ? (displaySettings.showRawScore ? `[${pairInfo.score}]` : '')
            : displaySettings.showRawScore
              ? `${percentText}%[${pairInfo.score}]`
              : `${percentText}%`;
          pairSpan.appendChild(scoreSpan);
          
          pairCell.appendChild(pairSpan);
        });
        
        grid.appendChild(pairCell);
        }
      });
      
      // grid-template-columnsを動的に調整
      // max-content: セル幅=コンテンツ幅+パディングのみ（右端の隙間を常に3pxに保持）
      const isJa = displaySettings.language === 'ja';
      const currencyColW = 'max-content';
      const recColW = isJa ? '3fr' : '2fr';
      // アクティブな通貨数を決定
      const activeCurrencyCount = displaySettings.activeCurrencies
        ? Object.values(displaySettings.activeCurrencies).filter(v => v !== false).length
        : 5;
      let columns = '50px'; // 時間列
      if (displaySettings.showCurrencies && displaySettings.showRecommended) {
        // 両方表示: 時間 + 通貨N列 + 推奨ペア
        columns += ` repeat(${activeCurrencyCount}, ${currencyColW}) ${recColW}`;
      } else if (displaySettings.showCurrencies) {
        // 通貨のみ: 時間 + 通貨N列
        columns += ` repeat(${activeCurrencyCount}, ${currencyColW})`;
      } else if (displaySettings.showRecommended) {
        // 推奨ペアのみ: 時間 + 推奨ペア
        columns += ` ${recColW}`;
      }
      grid.style.gridTemplateColumns = columns;
      
      console.log('[renderStrengthData] Grid template columns:', columns);
      
      table.appendChild(grid);
      container.appendChild(table);
      
      console.log('[renderStrengthData] Render complete. Container children:', container.children.length);
      
      } catch (error) {
        console.error('[renderStrengthData] ERROR during render:', error);
        console.error('[renderStrengthData] Stack trace:', error.stack);
        const container = document.getElementById('strengthData');
        if (container) {
          container.innerHTML = '<div style="color: red; padding: 20px;">レンダリングエラー: ' + error.message + '</div>';
        }
      }
    }

    // ゲージモード用レンダリング関数
    function renderGaugeLayout(data, container) {
      // container is already cleared
      const table = document.createElement('div');
      table.className = 'strength-table-wrapper';
      const grid = document.createElement('div');
      grid.className = 'strength-table-grid';

      // 利用する時間足のリスト
      const timeframes = [
        { key: '5m', id: 'show5m' },
        { key: '15m', id: 'show15m' },
        { key: '1H', id: 'show1H' },
        { key: '4H', id: 'show4H' },
        { key: 'D', id: 'showD' },
        { key: 'Av', id: 'showAv' }
      ].filter(tf => displaySettings[tf.id] && data[tf.key]);

      // ヘッダー行：順位と各時間足
      const headerRank = document.createElement('div');
      headerRank.className = 'table-header';
      headerRank.textContent = '順位';
      grid.appendChild(headerRank);
      timeframes.forEach(tf => {
        const h = document.createElement('div');
        h.className = 'table-header';
        h.textContent = tf.key;
        grid.appendChild(h);
      });

      // 各時間足ごとにソートされた通貨配列（強->弱）を作る
      const ranked = timeframes.map(tf => {
        const list = data[tf.key].currencies || [];
        const filtered = displaySettings.activeCurrencies
          ? list.filter(item => displaySettings.activeCurrencies[item.currency] !== false)
          : list.slice();
        filtered.sort((a,b) => (b.score||0) - (a.score||0));
        return filtered;
      });

      const maxRank = Math.max(...ranked.map(r=>r.length));
      // 各順位行を作成
      for (let i=0; i<maxRank; i++) {
        const rankCell = document.createElement('div');
        rankCell.className = 'table-row-label';
        rankCell.textContent = `${i+1}位`;
        grid.appendChild(rankCell);
        timeframes.forEach((tf, idx) => {
          const cell = document.createElement('div');
          cell.className = 'table-cell';
          const item = ranked[idx][i];
          if (item) {
            const rawScore = item.score || 0;
            const denom = (displaySettings.currencyNormalizationBase && displaySettings.currencyNormalizationBase>0)
                          ? displaySettings.currencyNormalizationBase : 350;
            let percentage = Math.round((rawScore/denom)*100);
            if (displaySettings.clipEnabled && Math.abs(rawScore) > (displaySettings.clipThreshold||350)) {
              percentage = rawScore>=0?100:-100;
            }
            const pctText = percentage>=0?`+${String(percentage).padStart(2,'0')}`:`-${String(Math.abs(percentage)).padStart(2,'0')}`;
            const color = percentage>=0 ? '#06b7f9' : '#ff57ea';
            const bars = '▮'.repeat(Math.floor(Math.abs(percentage)/10));
            cell.style.color = color;
            // currency+percent text always white; percentage visibility toggled
            let inner = `<span style="color:#fff">[${getCurrencyLabel(item.currency)}`;
            if (displaySettings.showPercentage) inner += `${pctText}%`;
            inner += `]</span>`;
            cell.innerHTML = inner + bars;
            cell.title = `${item.currency} score:${rawScore}`;
          } else {
            cell.textContent = '-';
            cell.style.opacity = '0.3';
          }
          grid.appendChild(cell);
        });
      }

      // カラム幅設定：順位＋時間足分
      let columns = '50px';
      columns += ` repeat(${timeframes.length}, max-content)`;
      grid.style.gridTemplateColumns = columns;

      table.appendChild(grid);
      container.appendChild(table);
    }

    // データ取得
    async function loadCurrencyStrength() {
      try {
        document.getElementById('loadingText').textContent = '読み込み中...';
        
        // キャッシュを無効化するためタイムスタンプを追加
        const timestamp = new Date().getTime();
        const response = await fetch(`/api/currency_strength?_=${timestamp}`);
        const result = await response.json();
        
        if (result.status === 'success') {
          console.log('[CURRENCY_STRENGTH] Data received:', result.data);
          window.currentData = result.data; // データを保存
          renderStrengthData(result.data);
          
          // 更新時刻を表示（サーバーから返された時刻を使用）
          let timeStr;
          if (result.data.last_updated) {
            // サーバーから返された時刻を使用（形式: 2026-01-30 09:00:41）
            timeStr = result.data.last_updated;
          } else {
            // フォールバック：現在時刻を使用
            const now = new Date();
            timeStr = now.toLocaleTimeString('ja-JP');
          }
          document.getElementById('loadingText').textContent = '✓ 更新完了';
          document.getElementById('updateTime').textContent = `最終更新: ${timeStr}`;
          // サーバーバージョンを表示（デプロイ確認用）
          
          setTimeout(() => {
            document.getElementById('loadingText').textContent = '';
          }, 2000);
        } else {
          document.getElementById('loadingText').textContent = '❌ エラー: ' + result.msg;
        }
      } catch (e) {
        console.error('[CURRENCY_STRENGTH] Error loading currency strength:', e);
        document.getElementById('loadingText').textContent = '❌ 通信エラー';
      }
    }

    // 60秒ごとに自動リフレッシュ（Socket.IOの補完）
    setInterval(loadCurrencyStrength, 60000);

    // Socket.IO接続とリアルタイム更新
    const socket = io();
    
    socket.on('connect', () => {
      console.log('[SOCKET.IO] ✓ Connected to server');
    });
    
    socket.on('disconnect', () => {
      console.log('[SOCKET.IO] ✗ Disconnected from server');
    });
    
    // Webhook受信時の通貨強弱更新
    socket.on('currency_strength_update', (payload) => {
      console.log('[SOCKET.IO] Currency strength update received:', payload);
      
      if (payload.status === 'success' && payload.data) {
        // 空の通貨データで既存の有効データを上書きしないようにマージ
        const newData = payload.data;
        if (window.currentData) {
          ['5m', '15m', '1H', '4H', 'D', 'Av'].forEach(tf => {
            const newTf = newData[tf];
            const oldTf = window.currentData[tf];
            if (newTf && (!newTf.currencies || newTf.currencies.length === 0) &&
                oldTf && oldTf.currencies && oldTf.currencies.length > 0) {
              console.log('[SOCKET.IO] ' + tf + ': empty currencies in update, keeping previous data');
              newData[tf] = oldTf;
            }
          });
        }
        window.currentData = newData;
        renderStrengthData(newData);
        
        // 変更履歴を更新（サーバーから取得）
        renderChangeHistory();
        
        // 更新時刻を表示（サーバーから返された時刻を使用）
        let timeStr;
        if (payload.data.last_updated) {
          // サーバーから返された時刻を使用
          timeStr = payload.data.last_updated;
        } else if (payload.timestamp) {
          // フォールバック：payload.timestampを使用
          const updateTime = new Date(payload.timestamp);
          timeStr = updateTime.toLocaleTimeString('ja-JP');
        } else {
          // フォールバック：現在時刻
          const now = new Date();
          timeStr = now.toLocaleTimeString('ja-JP');
        }
        document.getElementById('loadingText').textContent = '✓ 更新完了';
        document.getElementById('updateTime').textContent = `最終更新: ${timeStr}`;
        
        setTimeout(() => {
          document.getElementById('loadingText').textContent = '';
        }, 2000);
      }
    });
    
    // 初期化処理
    async function initCurrencyStrength() {
      console.log('[CURRENCY_STRENGTH] Initializing...');
      
      // 電子音ファイルリストを取得
      await populateChimeFiles();
      
      // 保存された設定を読み込み
      loadSettings();
      
      // 変更履歴を表示
      renderChangeHistory();
      
      // 保存ボタンのイベントリスナーを追加
      const saveBtn = document.getElementById('saveSettings');
      if (saveBtn) {
        saveBtn.addEventListener('click', saveSettings);
        console.log('[INIT] 保存ボタンのイベントリスナーを追加');
      }
      
      // ズームセレクトのイベントリスナーを追加
      const zoomSelect = document.getElementById('zoomLevel');
      if (zoomSelect) {
        zoomSelect.addEventListener('change', (e) => {
          applyZoom(e.target.value);
        });
        console.log('[INIT] ズームセレクトのイベントリスナーを追加');
      }

      // 表示設定: 正規化 / クリップ入力のイベントリスナーを追加
      const currencyNormInput = document.getElementById('currencyNormBase');
      const pairNormInput = document.getElementById('pairNormBase');
      const clipCheckbox = document.getElementById('clipEnabled');
      const clipThresholdInput = document.getElementById('clipThreshold');

      if (currencyNormInput) {
        currencyNormInput.addEventListener('change', (e) => {
          const v = Number(e.target.value) || displaySettings.currencyNormalizationBase;
          displaySettings.currencyNormalizationBase = Math.max(1, Math.min(displaySettings.currencyMaxTheoretical, v));
          if (window.currentData) renderStrengthData(window.currentData);
        });
      }
      if (pairNormInput) {
        pairNormInput.addEventListener('change', (e) => {
          const v = Number(e.target.value) || displaySettings.pairNormalizationBase;
          displaySettings.pairNormalizationBase = Math.max(1, Math.min(displaySettings.pairMaxTheoretical, v));
          if (window.currentData) renderStrengthData(window.currentData);
        });
      }
      if (clipCheckbox) {
        clipCheckbox.addEventListener('change', (e) => {
          displaySettings.clipEnabled = !!e.target.checked;
          if (window.currentData) renderStrengthData(window.currentData);
        });
      }
      if (clipThresholdInput) {
        clipThresholdInput.addEventListener('change', (e) => {
          const v = Number(e.target.value) || displaySettings.clipThreshold;
          displaySettings.clipThreshold = Math.max(1, Math.min(displaySettings.currencyMaxTheoretical, v));
          if (window.currentData) renderStrengthData(window.currentData);
        });
      }

      console.log('[INIT] 表示設定用イベントリスナを追加');
      
      // 初回データ読み込み（その後はSocket.IOで自動更新）
      loadCurrencyStrength();
      
      console.log('[INIT] 初期化完了 - 以降はWebhook受信時に自動更新されます');
    }
    
    // 初回読み込み
    initCurrencyStrength();
  </script>
</body>
