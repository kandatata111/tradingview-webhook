<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>{{ symbol }} - ダウ雲</title>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<style>
body { font-family: 'Yu Gothic', 'Meiryo', sans-serif; background: #1e3c72; color: #fff; padding: 0; margin: 0; }
#table-container { padding: 6px 8px; }
.loading { color: #aaa; padding: 20px; text-align: center; }

/* テーブル基本スタイル */
table { border-collapse: collapse; width: 100%; table-layout: auto; }
th, td { border: 1px solid rgba(255,255,255,0.15); padding: 3px 6px; white-space: nowrap; text-align: center; font-size: 13px; }
.header-black { background: #000 !important; color: #fff !important; }
.price-row td:first-child { background: #fff !important; color: #000 !important; font-weight: bold; }
table th { font-weight: bold; }
table td { font-family: 'Yu Gothic', 'Meiryo', sans-serif !important; font-weight: 600; }
table th:nth-child(9), table td:nth-child(9),
table th:nth-child(10), table td:nth-child(10),
table th:nth-child(11), table td:nth-child(11) { text-align: right; }
table th:nth-child(9), table th:nth-child(10), table th:nth-child(11) { text-align: center; }

/* TFラベル色 */
.tf-label { text-align: center; font-weight: bold; }

/* ゲージ */
.gauge-cell { width: 150px; min-width: 120px; max-width: 180px; padding: 2px 3px; }
.gauge-wrapper { position: relative; height: 10px; border: 1px solid rgba(255,255,255,0.9); border-radius: 3px; overflow: hidden; padding: 2px; }
.gauge-fill { position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px; background: rgba(255,255,255,0.98); border-radius: 2px; transform-origin: left center; transition: transform 0.28s ease; transform: scaleX(0); }
.gauge-sep { position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px; pointer-events: none; }

/* 発火セル */
.fire-cell { width: 36px; min-width: 36px; max-width: 36px; font-size: 0.9em; text-align: center; white-space: nowrap; }

/* 古いデータ警告 */
.tf-stale { color: #ff9800; font-weight: bold; margin-left: 2px; }

/* ドラッグハンドル風ヘッダー */
.drag-handle { background: #1a3a6b; padding: 5px 8px; }

/* テーブルラップ */
.table-wrap { overflow-x: auto; }
</style>
</head>
<body>
<div id="table-container"><div class="loading">読み込み中...</div></div>

<script>
// =================== 設定定数 ===================
const SYMBOL = '{{ symbol }}';

const currencyNames = {
  'USDJPY': 'ドル円', 'EURUSD': 'ユーロドル', 'GBPUSD': 'ポンドドル',
  'GBPJPY': 'ポンド円', 'AUDUSD': 'オージドル', 'AUDJPY': 'オージ円',
  'NZDUSD': 'ニュージードル', 'NZDJPY': 'ニュージー円', 'CADJPY': 'カナダ円',
  'CHFJPY': 'スイス円', 'EURJPY': 'ユーロ円', 'GBPAUD': 'ポンドオージ',
  'EURGBP': 'ユーロポンド', 'USDCAD': 'ドルカナダ', 'USDCHF': 'ドルスイス',
  'EURAUD': 'ユーロオージ', 'EURCAD': 'ユーロカナダ', 'EURCHF': 'ユーロスイス',
  'GBPCAD': 'ポンドカナダ', 'GBPCHF': 'ポンドスイス', 'AUDCAD': 'オージカナダ',
  'AUDCHF': 'オージスイス', 'AUDNZD': 'オージニュージー', 'NZDCAD': 'ニュージーカナダ',
  'NZDCHF': 'ニュージースイス', 'CADCHF': 'カナダスイス'
};

const timeframeConfig = {
  '5':   { label: '5分足',   upper: ['15', '60', '240', 'D'], displayOrder: ['5', 'price', '15', '60', '240', 'D'] },
  '15':  { label: '15分足',  upper: ['60', '240', 'D'],       displayOrder: ['15', 'price', '60', '240', 'D'] },
  '60':  { label: '1時間足', upper: ['240', 'D', 'W'],        displayOrder: ['60', 'price', '240', 'D', 'W'] },
  '240': { label: '4時間足', upper: ['D', 'W', 'M'],          displayOrder: ['240', 'price', 'D', 'W', 'M'] },
  'D':   { label: '日足',    upper: ['W', 'M'],               displayOrder: ['D', 'price', 'W', 'M'] },
  'W':   { label: '週足',    upper: ['M'],                    displayOrder: ['W', 'price', 'M'] },
  'M':   { label: '年足',    upper: [],                       displayOrder: ['M', 'price'] }
};

let allRules = [];

// =================== ヘルパー関数 ===================

function getTfDisplayLabel(jsonLabel) {
  if (jsonLabel === '5')   return '5m';
  if (jsonLabel === '15')  return '15m';
  if (jsonLabel === '60')  return '1H';
  if (jsonLabel === '240') return '4H';
  return jsonLabel;
}

function getTfJsonLabel(displayLabel) {
  if (displayLabel === '5m')  return '5';
  if (displayLabel === '15m') return '15';
  if (displayLabel === '1H')  return '60';
  if (displayLabel === '4H')  return '240';
  return displayLabel;
}

function _normalizeTfKey(x) {
  if (x === null || x === undefined) return x;
  const s = String(x).trim();
  if (s === 'price') return 'price';
  const low = s.toLowerCase();
  if (low === '5' || low === '5m') return '5';
  if (low === '15' || low === '15m') return '15';
  if (low === '60' || low === '1h') return '60';
  if (low === '240' || low === '4h') return '240';
  if (low === 'd' || low === '1d') return 'D';
  if (low === 'w' || low === '1w') return 'W';
  if (low === 'm' || low === '1m') return 'M';
  const m = s.match(/(\d+)/);
  if (m) return m[1];
  return s;
}

function isStaleData(symbol, tf, timestamp) {
  if (!timestamp) return true;
  try {
    const updateTime = new Date(timestamp);
    const now = new Date();
    const thresholds = { '5': 6, '15': 16, '60': 61, '240': 241, 'D': null, '1D': null };
    if (tf === 'D' || tf === '1D') {
      const diffMinutes = (now - updateTime) / (1000 * 60);
      return diffMinutes >= 24 * 60;
    }
    const threshold = thresholds[tf];
    if (threshold === undefined) return false;
    const diffMinutes = (now - updateTime) / (1000 * 60);
    return diffMinutes >= threshold;
  } catch (e) { return false; }
}

function formatElapsedTime(datetimeStr, format) {
  if (!datetimeStr || datetimeStr === '-' || datetimeStr === '') return '-';
  if (format === 'datetime') return datetimeStr;
  try {
    const now = new Date();
    const segments = datetimeStr.trim().split('/');
    if (segments.length < 4) return datetimeStr;
    const year = 2000 + parseInt(segments[0], 10);
    const month = parseInt(segments[1], 10) - 1;
    const day = parseInt(segments[2], 10);
    const timePart = segments[3];
    const timeSegments = timePart.split(':');
    if (timeSegments.length < 2) return datetimeStr;
    const hour = parseInt(timeSegments[0], 10);
    const minute = parseInt(timeSegments[1], 10);
    const startTime = new Date(year, month, day, hour, minute);
    const elapsedMs = now - startTime;
    const elapsedMinutes = Math.floor(elapsedMs / 60000);
    const roundedElapsedMinutes = Math.floor(elapsedMinutes / 5) * 5;
    if (elapsedMinutes < 0) return datetimeStr;
    if (format === 'm') return roundedElapsedMinutes + 'm';
    if (format === 'hm') {
      const hours = Math.floor(roundedElapsedMinutes / 60);
      const mins = roundedElapsedMinutes % 60;
      return String(hours).padStart(2, '0') + ':' + String(mins).padStart(2, '0');
    }
    if (format === 'dhm') {
      const days = Math.floor(roundedElapsedMinutes / 1440);
      const remainMins = roundedElapsedMinutes % 1440;
      const hours = Math.floor(remainMins / 60);
      const mins = remainMins % 60;
      return String(days).padStart(2, '0') + '/' + String(hours).padStart(2, '0') + ':' + String(mins).padStart(2, '0');
    }
    return datetimeStr;
  } catch (e) { return datetimeStr; }
}

function parseElapsedMin(datetimeStr) {
  if (!datetimeStr || datetimeStr === '-' || datetimeStr === '') return null;
  const segs = datetimeStr.trim().split('/');
  if (segs.length < 4) return null;
  const year = 2000 + parseInt(segs[0], 10);
  const month = parseInt(segs[1], 10) - 1;
  const day = parseInt(segs[2], 10);
  const tp = segs[3].split(':');
  const hour = parseInt(tp[0], 10) || 0;
  const minute = parseInt(tp[1], 10) || 0;
  const d = new Date(year, month, day, hour, minute);
  const diff = Date.now() - d.getTime();
  if (diff < 0) return null;
  return Math.floor(diff / 60000);
}

function formatTimeDiff(diffMin, format) {
  if (diffMin === null) return '-';
  if (format === 'datetime' || format === 'hm') {
    const hours = Math.floor(diffMin / 60);
    const mins = diffMin % 60;
    return String(hours).padStart(2, '0') + ':' + String(mins).padStart(2, '0');
  }
  if (format === 'm') return diffMin + 'm';
  if (format === 'dhm') {
    const days = Math.floor(diffMin / 1440);
    const remainMins = diffMin % 1440;
    const hours = Math.floor(remainMins / 60);
    const mins = remainMins % 60;
    return String(days).padStart(2, '0') + '/' + String(hours).padStart(2, '0') + ':' + String(mins).padStart(2, '0');
  }
  return diffMin + 'm';
}

function getRuleConditionFieldsForSymbol(symbol, ruleId) {
  if (!allRules || allRules.length === 0) return [];
  function getConditions(r) {
    if (Array.isArray(r.conditions) && r.conditions.length > 0) return r.conditions;
    if (r.rule && Array.isArray(r.rule.conditions)) return r.rule.conditions;
    return [];
  }
  if (ruleId) {
    const rule = allRules.find(r => r.id === ruleId);
    if (rule) {
      return getConditions(rule)
        .filter(c => c && c.field && ['dauten','gc','po'].includes(c.field))
        .map(c => c.field);
    }
  }
  const fields = new Set();
  allRules.forEach(r => {
    if (r.enabled === false) return;
    const scope = r.scope || {};
    if (scope.symbol && scope.symbol !== symbol) return;
    getConditions(r).forEach(c => {
      if (c && c.field && ['dauten','gc','po'].includes(c.field)) fields.add(c.field);
    });
  });
  return Array.from(fields);
}

function getAlignedTimeDiffForFire(cloud, ruleFields, fireDirection) {
  if (!cloud || !ruleFields || ruleFields.length === 0) return null;
  const expectedUp = (fireDirection === '上昇');
  function parseDatetimeStr(str) {
    if (!str || str === '-') return 0;
    const segs = str.split('/');
    if (segs.length < 4) return 0;
    const year = 2000 + parseInt(segs[0]);
    const month = parseInt(segs[1]) - 1;
    const day = parseInt(segs[2]);
    const tp = segs[3].split(':');
    const hour = parseInt(tp[0]) || 0;
    const minute = parseInt(tp[1]) || 0;
    const d = new Date(year, month, day, hour, minute);
    return isNaN(d.getTime()) ? 0 : d.getTime();
  }
  const candidates = [];
  for (const field of ruleFields) {
    let isUp = null, tMs = 0, tStr = '';
    if (field === 'dauten') {
      const d = cloud.dauten;
      if (d === '▲Dow' || d === 'up') isUp = true;
      else if (d === '▼Dow' || d === 'down') isUp = false;
      tStr = cloud.dauten_start_time_str || '';
      tMs = Number(cloud.dauten_start_time) || parseDatetimeStr(tStr);
    } else if (field === 'gc') {
      const g = cloud.gc;
      if (g === '▲GC' || g === true) isUp = true;
      else if (g === '▼DC' || g === false) isUp = false;
      tStr = cloud.cross_start_time_str || '';
      tMs = Number(cloud.cross_start_time) || parseDatetimeStr(tStr);
    } else if (field === 'po') {
      const p = cloud.po;
      if (p && String(p).startsWith('▲')) isUp = true;
      else if (p && String(p).startsWith('▼')) isUp = false;
      tStr = cloud.po_fire_time_str || '';
      tMs = parseDatetimeStr(tStr);
    }
    if (isUp === null || isUp !== expectedUp) continue;
    if (!tStr || tStr === '-') continue;
    candidates.push({ tMs, tStr });
  }
  if (candidates.length === 0) return null;
  let best = candidates[0];
  for (const c of candidates) { if (c.tMs > best.tMs) best = c; }
  const ms = best.tMs;
  const diffMin = ms > 0 ? Math.floor(Math.max(0, (Date.now() - ms) / 60000) / 5) * 5 : 0;
  return { diff: diffMin, alignedAtStr: best.tStr };
}

// =================== テーブルレンダリング ===================

function renderTable(allStates, container) {
  let baseTimeframe = localStorage.getItem('tv_base_timeframe') || '5';
  let config = timeframeConfig[baseTimeframe];
  if (!config) {
    for (const fbKey of ['15', '60', '240', 'D']) {
      if (timeframeConfig[fbKey]) { config = timeframeConfig[fbKey]; baseTimeframe = fbKey; break; }
    }
  }
  if (!config) { container.innerHTML = '<div class="loading">設定エラー</div>'; return; }

  const findValidState = (sym, tfVariants) => {
    const matches = allStates.filter(x => x.symbol === sym && tfVariants.includes(x.tf));
    return matches.find(x => x.clouds && x.clouds.length > 0) || matches[0];
  };

  let baseState = findValidState(SYMBOL, [baseTimeframe]);
  if (!baseState) {
    for (const fallbackTf of ['15', '60', '240', 'D', 'W', 'M', '5']) {
      const fb = findValidState(SYMBOL, [fallbackTf]);
      if (fb) { baseState = fb; break; }
    }
  }
  if (!baseState) { container.innerHTML = '<div class="loading">データなし（' + SYMBOL + '）</div>'; return; }

  const upperStates = {};
  config.upper.forEach(tf => { upperStates[tf] = findValidState(SYMBOL, [tf]); });

  // 更新時刻
  let updateTime = 'N/A';
  if (baseState.timestamp) {
    const dt = new Date(baseState.timestamp);
    const year = String(dt.getFullYear()).slice(-2);
    const month = String(dt.getMonth() + 1).padStart(2, '0');
    const day = String(dt.getDate()).padStart(2, '0');
    const hour = String(dt.getHours()).padStart(2, '0');
    const min = String(dt.getMinutes()).padStart(2, '0');
    const sec = String(dt.getSeconds()).padStart(2, '0');
    updateTime = year + '/' + month + '/' + day + '/' + hour + ':' + min + ':' + sec;
  }

  // displayTfs
  const displayTfs = [baseTimeframe, ...config.upper];

  // mergedClouds構築
  const mergedClouds = [];
  displayTfs.forEach(tf => {
    const jsonLabel = tf;
    let sourceState = null, cloudData = null;
    if (tf === baseTimeframe) {
      sourceState = baseState;
      cloudData = baseState.clouds;
    } else {
      cloudData = baseState.clouds;
      if (cloudData && cloudData.length > 0) {
        const cloudObj = cloudData.find(c => c.label === jsonLabel);
        if (cloudObj) sourceState = { ...baseState, clouds: [cloudObj] };
      }
    }
    if (sourceState && sourceState.clouds && sourceState.clouds.length > 0) {
      let cloud = null;
      if (tf === baseTimeframe) {
        cloud = sourceState.clouds.find(c => c.label === jsonLabel);
      } else {
        if (upperStates[tf] && upperStates[tf].clouds) {
          cloud = upperStates[tf].clouds.find(c => c.label === jsonLabel);
        }
        if (!cloud) cloud = sourceState.clouds.find(c => c.label === jsonLabel);
      }
      if (!cloud) cloud = { ...sourceState.clouds[0], label: jsonLabel };
      else cloud = { ...cloud };

      if (tf === baseTimeframe && baseState.daytrade) {
        cloud.bos_count = baseState.daytrade.bos || '-';
      } else if (upperStates[tf] && upperStates[tf].daytrade) {
        cloud.bos_count = upperStates[tf].daytrade.bos || '-';
      } else {
        cloud.bos_count = cloud.bos_count || '-';
      }
      mergedClouds.push(cloud);
    }
  });

  // rowOrder
  const sourceOrder = (baseState.row_order && Array.isArray(baseState.row_order) && baseState.row_order.length > 0)
    ? baseState.row_order : config.displayOrder;
  let rowOrder = Array.isArray(sourceOrder) ? [...sourceOrder] : [];

  try {
    const rowOrderMode = localStorage.getItem('tv_row_order_mode') || 'auto';
    if (rowOrderMode === 'fixed') {
      const fixedPriority = ['D','240','60','15','5','price'];
      const normSource = rowOrder.map(orig => ({ orig, key: _normalizeTfKey(orig) }));
      const usedIdx = new Set();
      const orderedFixed = [];
      fixedPriority.forEach(fp => {
        const idx = normSource.findIndex(item => item.key === fp);
        if (idx !== -1 && !usedIdx.has(idx)) { orderedFixed.push(normSource[idx].orig); usedIdx.add(idx); }
      });
      const remaining = normSource.filter((_, i) => !usedIdx.has(i)).map(item => item.orig);
      rowOrder = orderedFixed.concat(remaining);
    }
  } catch (e) {}

  const orderedRows = [];
  rowOrder.forEach(label => {
    if (label === 'price') {
      orderedRows.push({ type: 'price', price: baseState.price });
    } else {
      const jsonLabel = getTfJsonLabel(label);
      const cloud = mergedClouds.find(c => c.label === jsonLabel);
      if (cloud) orderedRows.push({ type: 'cloud', ...cloud });
    }
  });

  // displayName
  let displayName = SYMBOL;
  if (currencyNames[SYMBOL]) displayName += '［' + currencyNames[SYMBOL] + '］';

  const _showUpdateTime = localStorage.getItem('tv_show_update_time') !== 'false';
  const _updateTimeSpan = _showUpdateTime ? '<span style="float:right;">更新 ' + updateTime + '</span>' : '';

  let html = '<div class="table-wrap"><table><tr><th class="drag-handle" colspan="16" style="text-align:center;color:white;">'
    + displayName + ' - ' + baseState.price + _updateTimeSpan + '</th></tr>';
  html += '<tr><th class="header-black">雲整列</th><th class="header-black">ダウ転</th><th class="header-black">突破数</th><th class="header-black">雲交差</th><th class="header-black">PO</th><th class="header-black">各雲間</th><th class="header-black">価格間</th><th class="header-black">雲角度</th><th class="header-black">雲厚み</th><th class="header-black">ダウ時間</th><th class="header-black">交差時間</th><th class="header-black">PO時間</th><th class="header-black">トレンド</th><th class="header-black">強度ゲージ</th><th class="header-black" style="color:#ffdd66">発火</th><th class="header-black">経過時間</th></tr>';

  const timeFormat = localStorage.getItem('tv_time_format') || 'datetime';

  orderedRows.forEach(row => {
    if (row.type === 'price') {
      html += '<tr class="price-row"><td class="tf-label">価格</td><td colspan="15"></td></tr>';
    } else {
      const c = row;
      html += '<tr>';
      const displayLabel = getTfDisplayLabel(c.label);
      const visibleLabel = (displayLabel === '15m') ? '15' : displayLabel;

      // stale判定
      let stateForTf = null;
      try {
        if (baseState && (_normalizeTfKey(baseState.tf) === String(c.label))) {
          stateForTf = baseState;
        } else if (upperStates && upperStates[c.label]) {
          stateForTf = upperStates[c.label];
        } else {
          stateForTf = allStates.find(s => _normalizeTfKey(s.tf) === String(c.label) && s.symbol === SYMBOL);
        }
      } catch (e) {}
      const isStale = stateForTf ? isStaleData(SYMBOL, String(c.label), stateForTf.received_at) : false;
      const staleMarkHtml = isStale ? '<span class="tf-stale" title="データが古い">!</span>' : '';

      let tfBgColor = '';
      if (displayLabel === '5m') tfBgColor = '#a9e88c';
      else if (displayLabel === '15m') tfBgColor = '#fbd0b2';
      else if (displayLabel === '1H') tfBgColor = '#8dc7fc';
      else if (displayLabel === '4H') tfBgColor = '#fa8dfe';
      else if (displayLabel === 'D') tfBgColor = '#dccb9c';
      else if (displayLabel === 'W') tfBgColor = '#d99ee6';
      else if (displayLabel === 'M') tfBgColor = '#c0c0c0';

      if (tfBgColor) html += '<td class="tf-label" style="background:' + tfBgColor + ';color:#000">' + visibleLabel + staleMarkHtml + '</td>';
      else html += '<td class="tf-label">' + visibleLabel + staleMarkHtml + '</td>';

      // ダウ転
      let dautenColor = '', dautenText = '-';
      if (c.dauten === '▲Dow' || c.dauten === 'up') { dautenColor = '#2962ff'; dautenText = '▲Dow'; }
      else if (c.dauten === '▼Dow' || c.dauten === 'down') { dautenColor = '#f23645'; dautenText = '▼Dow'; }

      // GC/DC
      let gcColor = '', gcText = '-';
      if (c.gc === '▲GC') { gcColor = '#2962ff'; gcText = '▲GC'; }
      else if (c.gc === '▼DC') { gcColor = '#f23645'; gcText = '▼DC'; }

      const toNum = v => {
        if (v === null || v === undefined || v === '' || v === 'N/A' || v === 'na') return null;
        const num = Number(v);
        return isNaN(num) ? null : num;
      };
      const prev = toNum(c.distance_from_prev);
      const prevColor = prev !== null ? (prev > 0 ? '#2962ff' : (prev < 0 ? '#f23645' : '')) : '';
      const dp = toNum(c.distance_from_price);
      const dpColor = dp !== null ? (dp > 0 ? '#2962ff' : (dp < 0 ? '#f23645' : '')) : '';
      const ang = toNum(c.angle);
      const angColor = ang !== null ? (ang > 0 ? '#2962ff' : (ang < 0 ? '#f23645' : '')) : '';
      const th = toNum(c.thickness);
      const thColor = th !== null ? (th > 0 ? '#2962ff' : (th < 0 ? '#f23645' : '')) : '';

      if (dautenColor) html += '<td style="background:' + dautenColor + ';color:#fff">' + dautenText + '</td>';
      else html += '<td>' + dautenText + '</td>';

      // BOS
      let bosVal = c.bos_count;
      let displayBos = '-';
      if (bosVal !== null && bosVal !== undefined && bosVal !== '') {
        if (typeof bosVal === 'string') displayBos = bosVal;
        else if (typeof bosVal === 'number') displayBos = bosVal === 0 ? '-' : 'BOS-' + bosVal;
      }
      if (dautenColor) html += '<td style="background:' + dautenColor + ';color:#fff">' + displayBos + '</td>';
      else html += '<td>' + displayBos + '</td>';

      if (gcColor) html += '<td style="background:' + gcColor + ';color:#fff">' + gcText + '</td>';
      else html += '<td>' + gcText + '</td>';

      // PO
      let poText = '-', poBgColor = '';
      if (c.po) {
        poText = c.po;
        if (String(c.po).startsWith('▲')) poBgColor = '#2962ff';
        else if (String(c.po).startsWith('▼')) poBgColor = '#f23645';
        else if (c.po === '✕') poBgColor = '#9c9c9c';
      }
      if (poBgColor) html += '<td style="background:' + poBgColor + ';color:#fff">' + poText + '</td>';
      else html += '<td>' + poText + '</td>';

      if (prevColor) html += '<td style="background:' + prevColor + ';color:#fff">' + (prev !== null ? prev.toFixed(1) : '-') + '</td>';
      else html += '<td>' + (prev !== null ? prev.toFixed(1) : '-') + '</td>';

      if (dpColor) html += '<td style="background:' + dpColor + ';color:#fff">' + (dp !== null ? dp.toFixed(1) : '-') + '</td>';
      else html += '<td>' + (dp !== null ? dp.toFixed(1) : '-') + '</td>';

      if (angColor) html += '<td style="background:' + angColor + ';color:#fff">' + (ang !== null ? ang.toFixed(1) + '°' : '-') + '</td>';
      else html += '<td>' + (ang !== null ? ang.toFixed(1) + '°' : '-') + '</td>';

      if (gcColor) html += '<td style="background:' + gcColor + ';color:#fff">' + (th !== null ? th.toFixed(1) : '-') + '</td>';
      else html += '<td>' + (th !== null ? th.toFixed(1) : '-') + '</td>';

      // ダウ時間
      const dautenTimeFormatted = formatElapsedTime(c.dauten_start_time_str || '-', timeFormat);
      let dautenBg = dautenColor;
      const dautenMin = parseElapsedMin(c.dauten_start_time_str || '-');
      if (dautenMin !== null) {
        let barM = (c.label === 'D') ? 1440 : (parseInt(c.label, 10) || 0);
        if (barM > 0 && dautenMin <= barM * 10) {
          dautenBg = (dautenColor === '#2962ff') ? '#06b7f9' : (dautenColor === '#f23645' ? '#ff57ea' : dautenColor);
        }
      }
      if (dautenBg) html += '<td style="background:' + dautenBg + ';color:#fff">' + dautenTimeFormatted + '</td>';
      else html += '<td>' + dautenTimeFormatted + '</td>';

      // 交差時間
      const crossTimeFormatted = formatElapsedTime(c.cross_start_time_str || '-', timeFormat);
      let crossBg = gcColor;
      const crossMin = parseElapsedMin(c.cross_start_time_str || '-');
      if (crossMin !== null) {
        let barM = (c.label === 'D') ? 1440 : (parseInt(c.label, 10) || 0);
        if (barM > 0 && crossMin <= barM * 10) {
          crossBg = (gcColor === '#2962ff') ? '#06b7f9' : (gcColor === '#f23645' ? '#ff57ea' : gcColor);
        }
      }
      if (crossBg) html += '<td style="background:' + crossBg + ';color:#fff">' + crossTimeFormatted + '</td>';
      else html += '<td>' + crossTimeFormatted + '</td>';

      // PO時間
      const poTimeFormatted = formatElapsedTime(c.po_fire_time_str || '-', timeFormat);
      let poFinalBg = poBgColor;
      const poMin = parseElapsedMin(c.po_fire_time_str || '-');
      if (poMin !== null) {
        let barM = (c.label === 'D') ? 1440 : (parseInt(c.label, 10) || 0);
        if (barM > 0 && poMin <= barM * 10) {
          poFinalBg = (poBgColor === '#2962ff') ? '#06b7f9' : (poBgColor === '#f23645' ? '#ff57ea' : poBgColor);
        }
      }
      if (poFinalBg) html += '<td style="background:' + poFinalBg + ';color:#fff">' + poTimeFormatted + '</td>';
      else html += '<td>' + poTimeFormatted + '</td>';

      // トレンド
      const labelToTfMap = {
        '5m':['5','5m'], '15m':['15','15m'], '1H':['60','1h','1H'], '4H':['240','4h','4H'],
        'D':['D','1D'], 'W':['W','1W'], 'M':['M','1M']
      };
      const tfVariants = labelToTfMap[c.label] || [c.label];
      let tfState = allStates.find(s => s.symbol === SYMBOL && s.tf_normalized === c.label);
      if (!tfState) tfState = allStates.find(s => s.symbol === SYMBOL && tfVariants.includes(s.tf));

      const direction = tfState && tfState.trend_direction ? tfState.trend_direction : 'range';
      const trendScore = tfState && tfState.trend_score ? tfState.trend_score : 0;
      const percentage = tfState && tfState.trend_percentage !== undefined ? tfState.trend_percentage : Math.min(100, Math.max(0, trendScore));
      const percentStr = String(percentage).padStart(2, '0');

      let trendColor = '#9c9c9c';
      if (direction !== 'range' && trendScore >= 20) {
        trendColor = direction === 'up' ? '#06b7f9' : '#ff57ea';
      }

      let cellContent = '', cellBg = trendColor;
      if (c.trend) {
        const labelStr = String(c.trend);
        if (labelStr.startsWith('▲')) cellBg = '#06b7f9';
        else if (labelStr.startsWith('▼')) cellBg = '#ff57ea';
        else cellBg = '#9c9c9c';
        cellContent = labelStr;
      } else {
        const gaugeCount = direction !== 'range' ? Math.round(percentage / 25) : 0;
        cellContent = percentStr + '% ' + '■'.repeat(gaugeCount) + '□'.repeat(4 - gaugeCount);
      }
      html += '<td style="background:' + cellBg + ';color:#fff;font-weight:bold;font-size:0.95em;font-family:monospace;">' + cellContent + '</td>';

      // ゲージバー
      let gaugePercentage = percentage;
      if (c.trend) { const m = String(c.trend).match(/(\d{1,3})%/); if (m) gaugePercentage = parseInt(m[1], 10); }
      const segCount = Math.floor(gaugePercentage / 20);
      const gaugeTitle = '強度: ' + gaugePercentage + '% (' + segCount + '/5)';
      const sepBg = 'repeating-linear-gradient(to right, transparent 0%, transparent calc(20% - 0.5px), ' + cellBg + ' calc(20% - 0.5px), ' + cellBg + ' calc(20% + 0.5px))';
      html += '<td class="gauge-cell" style="background:' + cellBg + ';padding:2px 3px;">'
        + '<div class="gauge-wrapper" title="' + gaugeTitle + '">'
        + '<div class="gauge-fill" style="transform:scaleX(' + (Math.max(0, Math.min(100, gaugePercentage)) / 100) + ')"></div>'
        + '<div class="gauge-sep" style="background:' + sepBg + '"></div>'
        + '</div></td>';

      // 発火セル
      const fireMeta = (tfState && tfState.last_fire) ? tfState.last_fire : null;
      const fireText = fireMeta ? (fireMeta.direction === '上昇' ? '▲買' : fireMeta.direction === '下降' ? '▼売' : '●') : '-';
      const fireBg = fireMeta ? (fireMeta.direction === '上昇' ? '#2962ff' : '#f23645') : '#9c9c9c';
      const fireTitle = fireMeta ? (fireMeta.rule_name || '') + (fireMeta.fired_at ? '\n' + fireMeta.fired_at : '') : '';
      html += '<td class="fire-cell"' + (fireTitle ? ' title="' + fireTitle + '"' : '') + ' style="background:' + fireBg + ';color:#fff;">' + fireText + '</td>';

      // 経過時間セル
      const ruleId = fireMeta && fireMeta.rule_id ? fireMeta.rule_id : null;
      const ruleFields = getRuleConditionFieldsForSymbol(SYMBOL, ruleId);
      let timeDiffFormatted = '-', timeDiffBg = '#9c9c9c';
      if (fireMeta) {
        timeDiffBg = fireMeta.direction === '上昇' ? '#2962ff' : '#f23645';
        const timeDiffResult = getAlignedTimeDiffForFire(c, ruleFields, fireMeta.direction);
        if (timeDiffResult) {
          let barMinutes = (c.label === 'D') ? 1440 : (parseInt(c.label, 10) || 0);
          if (barMinutes > 0 && timeDiffResult.diff <= barMinutes * 10) {
            timeDiffBg = (fireMeta.direction === '上昇') ? '#06b7f9' : '#ff57ea';
          }
          timeDiffFormatted = timeFormat === 'datetime' ? (timeDiffResult.alignedAtStr || '-') : formatTimeDiff(timeDiffResult.diff, timeFormat);
        }
      }
      html += '<td style="background:' + timeDiffBg + ';color:#fff">' + timeDiffFormatted + '</td>';
      html += '</tr>';
    }
  });

  html += '</table></div>';
  container.innerHTML = html;

  // タイトルバーも更新
  document.title = SYMBOL + ' - ' + baseState.price + ' | ダウ雲';
}

// =================== 設定適用（本体とリンク）===================

function applyFontSize() {
  const px = localStorage.getItem('tv_font_size') || '14';
  document.querySelectorAll('table th, table td').forEach(el => {
    el.style.fontSize = px + 'px';
  });
}

function applyColumnVisibility() {
  const savedCols = JSON.parse(localStorage.getItem('tv_cols') || '{}');
  for (let colIndex = 1; colIndex <= 15; colIndex++) {
    const visible = savedCols[colIndex.toString()] !== false;
    const selector = 'table th:nth-child(' + (colIndex + 1) + '), table td:nth-child(' + (colIndex + 1) + ')';
    document.querySelectorAll(selector).forEach(el => {
      el.style.display = visible ? '' : 'none';
    });
  }
}

function applyRowVisibility() {
  const savedRows = JSON.parse(localStorage.getItem('tv_rows') || '{}');
  document.querySelectorAll('table tr').forEach(tr => {
    const labelCell = tr.querySelector('.tf-label');
    if (!labelCell) return;
    const text = labelCell.textContent.trim().replace('!', '');
    let rowLabel = null;
    if (text === '価格') rowLabel = 'price';
    else if (text === '5m' || text === '5') rowLabel = '5m';
    else if (text === '15' || text === '15m') rowLabel = '15m';
    else if (text === '1H' || text === '60') rowLabel = '1H';
    else if (text === '4H' || text === '240') rowLabel = '4H';
    else if (text === 'D') rowLabel = 'D';
    else if (text === 'W') rowLabel = 'W';
    else if (text === 'M') rowLabel = 'M';
    if (rowLabel) {
      tr.style.display = savedRows[rowLabel] !== false ? '' : 'none';
    }
  });
}

function applyAllSettings() {
  applyFontSize();
  applyColumnVisibility();
  applyRowVisibility();
}

// =================== メイン処理 ===================

async function loadData() {
  const container = document.getElementById('table-container');
  try {
    const r = await fetch('/current_states');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if (data.status === 'success' && data.states.length > 0) {
      renderTable(data.states, container);
      applyAllSettings();
    } else {
      container.innerHTML = '<div class="loading">データなし</div>';
    }
  } catch (e) {
    container.innerHTML = '<div class="loading">読み込みエラー: ' + e.message + '</div>';
  }
}

// 本体ウィンドウでlocalStorageが変更されたらリアルタイムで再適用
window.addEventListener('storage', (e) => {
  const settingKeys = ['tv_cols', 'tv_rows', 'tv_font_size', 'tv_base_timeframe',
                       'tv_time_format', 'tv_row_order_mode', 'tv_show_update_time'];
  if (settingKeys.includes(e.key)) {
    // base_timeframeやrow_orderは再描画が必要
    if (e.key === 'tv_base_timeframe' || e.key === 'tv_row_order_mode' ||
        e.key === 'tv_time_format' || e.key === 'tv_show_update_time') {
      loadData();
    } else {
      applyAllSettings();
    }
  }
});

async function loadRules() {
  try {
    const r = await fetch('/rules');
    if (!r.ok) return;
    const data = await r.json();
    if (data.status === 'success') allRules = data.rules || [];
  } catch (e) {}
}

// Socket.IO 接続
const socket = io({ transports: ['websocket', 'polling'] });

socket.on('connect', () => { console.log('[SOCKET] Connected'); });

socket.on('update_table', async () => {
  await loadRules();
  await loadData();
});

socket.on('current_state_update', async () => {
  await loadRules();
  await loadData();
});
// 初期ロード
(async () => {
  await loadRules();
  await loadData();
})();
</script>
